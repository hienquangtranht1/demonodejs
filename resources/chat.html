<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
        body {
            margin: 0;
            padding-bottom: 3rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #form {
            background: rgba(0, 0, 0, 0.15);
            padding: 0.25rem;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            height: 3rem;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        #input {
            border: none;
            padding: 0 1rem;
            flex-grow: 1;
            border-radius: 2rem;
            margin: 0.25rem;
        }

        #input:focus {
            outline: none;
        }

        #form>button {
            background: #333;
            border: none;
            padding: 0 1rem;
            margin: 0.25rem;
            border-radius: 3px;
            outline: none;
            color: #fff;
        }

        #messages {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        #messages>li {
            padding: 0.5rem 1rem;
        }

        #messages>li:nth-child(odd) {
            background: #efefef;
        }
    </style>
</head>

<body>
    <div>
        <input type="text" id="jwt_text"
            value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5Y2IzN2Y3N2E4Nzk1NmI2OGMwODVlYSIsImlhdCI6MTc3NDkyODQ4NCwiZXhwIjoxNzc1MDE0ODg0fQ.3JnJ6GG4eSXcvxjdBssDJMoyUhfLp_GlMoGSuRQnKXs">
        <input type="button" onclick="getUser()" value="getUser">
        <p id="username"></p>
    </div>
    <div>
        <input type="text" id="user_text" value="69cb37fb7a87956b68c085ef">
        <input type="button" onclick="getMessage()" value="getMessage">
    </div>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" />
        <button>Send</button>
    </form>
</body>
<script src="/socket.io/socket.io.js"></script>
<script>
    var socket;
    function getUser() {
        let jwt = document.getElementById('jwt_text').value;
        socket = io({
            auth: {
                token: jwt,
                agent: navigator.userAgent
            }
        });
        socket.on('welcome', data => {
            document.getElementById('username').innerHTML = data
        })
        socket.on("newMessage", (data) => {
            getMessage()
        })
    }
    async function getMessage() {
        let userId = document.getElementById('user_text').value
        let jwt = document.getElementById('jwt_text').value
        socket.emit('userMessage', userId)
        let res = await fetch('http://localhost:3000/api/v1/message/' + userId, {
            method: 'GET',
            headers: {
                'authorization': jwt
            }
        })
        let messages = await res.json();
        document.getElementById('messages').innerHTML = "";
        for (const message of messages) {
            document.getElementById('messages').innerHTML += `<li>${message.from.username}:${message.messageContent.text}</li>`
        }
    }
    document.getElementById('form').addEventListener('submit', async e => {
        e.preventDefault()
        let text_message = document.getElementById('input').value;
        let jwt = document.getElementById('jwt_text').value;
        let userId = document.getElementById('user_text').value
        let res = await fetch('http://localhost:3000/api/v1/message', {
            method: 'POST',
            headers: {
                'authorization': jwt,
                "Content-Type": "application/json"
            }, body: JSON.stringify({
                to: userId,
                text: text_message
            })
        })
        if (res.ok) {
            getMessage()
            let data = await res.json()
            socket.emit('newMessage', data)
        }

    })

</script>

</html>
